<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>充电记录</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f5f5f7;
            --card: #ffffff;
            --primary: #007aff;
            --primary-light: rgba(0, 122, 255, 0.1);
            --success: #34c759;
            --success-light: rgba(52, 199, 89, 0.1);
            --danger: #ff3b30;
            --orange: #ff9500;
            --orange-light: rgba(255, 149, 0, 0.1);
            --text: #1d1d1f;
            --text-secondary: #86868b;
            --text-tertiary: #aeaeb2;
            --border: #e5e5ea;
            --shadow: 0 2px 16px rgba(0,0,0,0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding-bottom: 80px;
            -webkit-font-smoothing: antialiased;
        }

        .header {
            background: var(--card);
            padding: 16px 20px 12px;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid var(--border);
        }

        .header h1 {
            font-size: 20px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .month-summary {
            margin: 16px 16px 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 20px;
            padding: 20px;
            color: white;
        }

        .month-title { font-size: 14px; opacity: 0.9; margin-bottom: 8px; }
        .month-amount { font-size: 36px; font-weight: 700; margin-bottom: 4px; }
        .month-count { font-size: 13px; opacity: 0.8; }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            padding: 0 16px 16px;
        }

        .stat-card {
            background: var(--card);
            border-radius: 16px;
            padding: 16px;
            box-shadow: var(--shadow);
        }

        .stat-card.highlight {
            background: linear-gradient(135deg, #34c759 0%, #30d158 100%);
            color: white;
        }

        .stat-card.highlight .stat-value { color: white; }
        .stat-card.highlight .stat-label { color: rgba(255,255,255,0.8); }

        .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 4px;
        }

        .stat-label {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .quick-add {
            margin: 0 16px 16px;
            background: var(--card);
            border-radius: 20px;
            padding: 20px;
            box-shadow: var(--shadow);
        }

        .quick-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .input-group { margin-bottom: 14px; }

        .input-group label {
            display: block;
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .input-group input {
            width: 100%;
            padding: 14px 16px;
            border: 1.5px solid var(--border);
            border-radius: 14px;
            font-size: 16px;
            font-family: inherit;
            background: var(--bg);
            transition: border-color 0.2s;
            outline: none;
        }

        .input-group input:focus {
            border-color: var(--primary);
            background: white;
        }

        .input-row { display: flex; gap: 12px; }
        .input-row .input-group { flex: 1; }

        .input-with-hint {
            position: relative;
        }

        .input-hint {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 12px;
            color: var(--text-tertiary);
            pointer-events: none;
        }

        .quick-amounts {
            display: flex;
            gap: 8px;
            margin-bottom: 14px;
            flex-wrap: wrap;
        }

        .quick-amount-btn {
            padding: 10px 18px;
            border-radius: 20px;
            border: 1.5px solid var(--border);
            background: white;
            font-size: 14px;
            font-weight: 500;
            color: var(--text);
            cursor: pointer;
            transition: all 0.2s;
        }

        .quick-amount-btn:active {
            background: var(--primary-light);
            border-color: var(--primary);
            color: var(--primary);
        }

        .quick-mileage {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .quick-mileage-btn {
            padding: 8px 14px;
            border-radius: 16px;
            border: 1.5px solid var(--border);
            background: var(--success-light);
            font-size: 13px;
            font-weight: 500;
            color: var(--success);
            cursor: pointer;
            transition: all 0.2s;
        }

        .quick-mileage-btn:active {
            background: var(--success);
            color: white;
        }

        .submit-btn {
            width: 100%;
            padding: 16px;
            border-radius: 14px;
            border: none;
            background: var(--primary);
            color: white;
            font-size: 16px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s;
        }

        .submit-btn:active { transform: scale(0.98); opacity: 0.9; }

        .records-section { padding: 0 16px; }

        .section-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .section-count {
            font-size: 13px;
            color: var(--text-tertiary);
            font-weight: 400;
        }

        .month-card {
            background: var(--card);
            border-radius: 16px;
            margin-bottom: 10px;
            overflow: hidden;
            box-shadow: var(--shadow);
        }

        .month-header {
            padding: 16px;
            display: flex;
            align-items: center;
            cursor: pointer;
            transition: background 0.2s;
        }

        .month-header:active { background: var(--bg); }

        .month-icon {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            margin-right: 14px;
            flex-shrink: 0;
            color: white;
            font-weight: 600;
        }

        .month-info { flex: 1; }

        .month-name {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 2px;
        }

        .month-stats {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .month-total {
            font-size: 20px;
            font-weight: 700;
            color: var(--primary);
            margin-right: 12px;
        }

        .month-arrow {
            font-size: 14px;
            color: var(--text-tertiary);
            transition: transform 0.3s;
        }

        .month-card.open .month-arrow { transform: rotate(180deg); }

        .month-detail {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
        }

        .month-card.open .month-detail { max-height: 2000px; }

        .month-detail-inner {
            padding: 0 16px 16px;
            border-top: 1px solid var(--border);
        }

        .record-card {
            padding: 14px 0;
            display: flex;
            align-items: center;
            border-bottom: 1px solid var(--bg);
            cursor: pointer;
            transition: background 0.2s;
            animation: slideUp 0.3s ease;
        }

        .record-card:last-child { border-bottom: none; }
        .record-card:active { background: var(--bg); }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .record-icon {
            width: 40px;
            height: 40px;
            background: var(--primary-light);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            margin-right: 12px;
            flex-shrink: 0;
        }

        .record-content {
            flex: 1;
            min-width: 0;
        }

        .record-date {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 2px;
        }

        .record-meta {
            font-size: 12px;
            color: var(--text-secondary);
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .record-meta .mileage-tag {
            background: var(--success-light);
            color: var(--success);
            padding: 1px 6px;
            border-radius: 4px;
            font-weight: 500;
        }

        .record-right {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            margin-right: 8px;
            flex-shrink: 0;
        }

        .record-amount {
            font-size: 17px;
            font-weight: 700;
            color: var(--primary);
        }

        .record-cost-km {
            font-size: 11px;
            color: var(--success);
            font-weight: 500;
            margin-top: 2px;
        }

        .record-actions {
            display: flex;
            gap: 4px;
        }

        .action-btn {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            border: none;
            background: transparent;
            color: var(--text-tertiary);
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .action-btn:active { background: var(--primary-light); color: var(--primary); }
        .action-btn.delete:active { background: rgba(255, 59, 48, 0.1); color: var(--danger); }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-tertiary);
        }

        .empty-icon { font-size: 48px; margin-bottom: 12px; }

        .bottom-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid var(--border);
            padding: 12px 16px;
            padding-bottom: max(12px, env(safe-area-inset-bottom));
            display: flex;
            gap: 10px;
            z-index: 100;
        }

        .bar-btn {
            flex: 1;
            padding: 12px;
            border-radius: 12px;
            border: none;
            font-size: 14px;
            font-weight: 500;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s;
        }

        .bar-btn-primary { background: var(--primary); color: white; }
        .bar-btn-secondary { background: var(--bg); color: var(--text); }
        .bar-btn:active { transform: scale(0.97); }

        .toast {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%) translateY(-20px);
            background: var(--text);
            color: white;
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 14px;
            opacity: 0;
            transition: all 0.3s;
            z-index: 1000;
            pointer-events: none;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.4);
            z-index: 200;
            display: none;
            align-items: flex-end;
            justify-content: center;
            animation: fadeIn 0.2s ease;
        }

        .modal-overlay.show { display: flex; }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal {
            background: var(--card);
            border-radius: 20px 20px 0 0;
            width: 100%;
            max-width: 500px;
            padding: 20px;
            padding-bottom: max(20px, env(safe-area-inset-bottom));
            animation: slideUp2 0.3s ease;
        }

        @keyframes slideUp2 {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        .modal-handle {
            width: 36px;
            height: 4px;
            background: var(--border);
            border-radius: 2px;
            margin: 0 auto 16px;
        }

        .modal-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
            text-align: center;
        }

        .modal-btns {
            display: flex;
            gap: 10px;
            margin-top: 8px;
        }

        .modal-btn {
            flex: 1;
            padding: 14px;
            border-radius: 14px;
            border: none;
            font-size: 16px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s;
        }

        .modal-btn:active { transform: scale(0.97); }
        .modal-btn-cancel { background: var(--bg); color: var(--text); }
        .modal-btn-save { background: var(--primary); color: white; }
    </style>
</head>
<body>
    <header class="header">
        <h1>⚡ 充电记录</h1>
    </header>

    <div class="month-summary">
        <div class="month-title" id="monthTitle">本月充电</div>
        <div class="month-amount" id="monthAmount">¥0</div>
        <div class="month-count" id="monthCount">0 次充电</div>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-value" id="totalCount">0</div>
            <div class="stat-label">总次数</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="totalAmount">¥0</div>
            <div class="stat-label">总花费</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="avgAmount">¥0</div>
            <div class="stat-label">平均每次</div>
        </div>
        <div class="stat-card highlight">
            <div class="stat-value" id="overallCostKm">—</div>
            <div class="stat-label">每公里费用</div>
        </div>
    </div>

    <section class="quick-add">
        <h2 class="quick-title">➕ 添加充电记录</h2>
        <div class="input-row">
            <div class="input-group">
                <label>充电日期</label>
                <input type="date" id="chargeDate">
            </div>
            <div class="input-group">
                <label>金额（元）</label>
                <input type="number" id="chargeAmount" placeholder="0.00" inputmode="decimal">
            </div>
        </div>
        <div class="input-group">
            <label>快捷金额</label>
            <div class="quick-amounts">
                <button class="quick-amount-btn" onclick="setAmount(30)">30元</button>
                <button class="quick-amount-btn" onclick="setAmount(50)">50元</button>
                <button class="quick-amount-btn" onclick="setAmount(80)">80元</button>
                <button class="quick-amount-btn" onclick="setAmount(100)">100元</button>
                <button class="quick-amount-btn" onclick="setAmount(150)">150元</button>
            </div>
        </div>
        <div class="input-group">
            <label>当前里程（公里）</label>
            <div class="input-with-hint">
                <input type="number" id="chargeMileage" placeholder="看仪表盘填入" inputmode="numeric">
            </div>
            <div class="quick-mileage" id="quickMileage" style="margin-top:8px;display:none;">
                <button class="quick-mileage-btn" id="quickMileageBtn" onclick="fillLastMileage()"></button>
            </div>
        </div>
        <div class="input-group">
            <label>备注（选填）</label>
            <input type="text" id="chargeNote" placeholder="例如：特来电、家充">
        </div>
        <button class="submit-btn" onclick="addRecord()">保存记录</button>
    </section>

    <section class="records-section">
        <div class="section-title">
            <span>📋 历史记录</span>
            <span class="section-count" id="recordsCount">0 条</span>
        </div>
        <div id="recordsList"></div>
    </section>

    <div class="bottom-bar">
        <button class="bar-btn bar-btn-secondary" onclick="exportData()">📥 备份</button>
        <button class="bar-btn bar-btn-secondary" onclick="document.getElementById('importFile').click()">📤 恢复</button>
        <input type="file" id="importFile" accept=".json" style="display:none" onchange="handleImport(event)">
    </div>

    <div class="toast" id="toast"></div>

    <div class="modal-overlay" id="editModal" onclick="closeModalOutside(event)">
        <div class="modal">
            <div class="modal-handle"></div>
            <div class="modal-title">✏️ 修改记录</div>

            <div class="input-group">
                <label>充电日期</label>
                <input type="date" id="editDate">
            </div>
            <div class="input-group">
                <label>金额（元）</label>
                <input type="number" id="editAmount" placeholder="0.00" inputmode="decimal">
            </div>
            <div class="input-group">
                <label>当前里程（公里）</label>
                <input type="number" id="editMileage" placeholder="选填" inputmode="numeric">
            </div>
            <div class="input-group">
                <label>备注</label>
                <input type="text" id="editNote" placeholder="例如：特来电、家充">
            </div>

            <div class="modal-btns">
                <button class="modal-btn modal-btn-cancel" onclick="closeModal()">取消</button>
                <button class="modal-btn modal-btn-save" onclick="saveEdit()">保存</button>
            </div>
        </div>
    </div>

    <script>
        let records = JSON.parse(localStorage.getItem('evChargeRecords')) || [];
        let editingId = null;

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('chargeDate').valueAsDate = new Date();
            updateQuickMileage();
            renderAll();
        });

        function setAmount(amount) {
            document.getElementById('chargeAmount').value = amount;
            if (navigator.vibrate) navigator.vibrate(10);
        }

        function fillLastMileage() {
            const lastMileage = getLastMileage();
            if (lastMileage) {
                document.getElementById('chargeMileage').value = lastMileage;
                if (navigator.vibrate) navigator.vibrate(10);
            }
        }

        function getLastMileage() {
            const withMileage = records.filter(r => r.mileage != null && r.mileage > 0);
            if (withMileage.length === 0) return null;
            withMileage.sort((a, b) => new Date(b.date) - new Date(a.date));
            return withMileage[0].mileage;
        }

        function updateQuickMileage() {
            const lastMileage = getLastMileage();
            const container = document.getElementById('quickMileage');
            const btn = document.getElementById('quickMileageBtn');
            if (lastMileage) {
                btn.textContent = `上次: ${lastMileage} km`;
                container.style.display = 'flex';
            } else {
                container.style.display = 'none';
            }
        }

        function addRecord() {
            const date = document.getElementById('chargeDate').value;
            const amount = parseFloat(document.getElementById('chargeAmount').value);
            const mileageVal = document.getElementById('chargeMileage').value;
            const mileage = mileageVal ? parseInt(mileageVal) : null;
            const note = document.getElementById('chargeNote').value.trim();

            if (!date) { showToast('请选择日期'); return; }
            if (isNaN(amount) || amount <= 0) { showToast('请输入金额'); return; }

            records.unshift({
                id: Date.now(),
                date,
                amount,
                mileage,
                note,
                time: new Date().toLocaleTimeString('zh-CN', {hour: '2-digit', minute: '2-digit'})
            });

            save();
            renderAll();
            updateQuickMileage();

            document.getElementById('chargeAmount').value = '';
            document.getElementById('chargeMileage').value = '';
            document.getElementById('chargeNote').value = '';
            document.getElementById('chargeDate').valueAsDate = new Date();

            showToast('✅ 已保存');
            if (navigator.vibrate) navigator.vibrate([10, 50, 10]);
        }

        function deleteRecord(id) {
            if (confirm('确定删除这条记录？')) {
                records = records.filter(r => r.id !== id);
                save();
                renderAll();
                updateQuickMileage();
                showToast('已删除');
            }
        }

        function openEdit(id) {
            const record = records.find(r => r.id === id);
            if (!record) return;

            editingId = id;
            document.getElementById('editDate').value = record.date;
            document.getElementById('editAmount').value = record.amount;
            document.getElementById('editMileage').value = record.mileage || '';
            document.getElementById('editNote').value = record.note || '';
            document.getElementById('editModal').classList.add('show');
        }

        function closeModal() {
            document.getElementById('editModal').classList.remove('show');
            editingId = null;
        }

        function closeModalOutside(e) {
            if (e.target === document.getElementById('editModal')) closeModal();
        }

        function saveEdit() {
            if (!editingId) return;

            const date = document.getElementById('editDate').value;
            const amount = parseFloat(document.getElementById('editAmount').value);
            const mileageVal = document.getElementById('editMileage').value;
            const mileage = mileageVal ? parseInt(mileageVal) : null;
            const note = document.getElementById('editNote').value.trim();

            if (!date) { showToast('请选择日期'); return; }
            if (isNaN(amount) || amount <= 0) { showToast('请输入金额'); return; }

            const index = records.findIndex(r => r.id === editingId);
            if (index !== -1) {
                records[index].date = date;
                records[index].amount = amount;
                records[index].mileage = mileage;
                records[index].note = note;
                save();
                renderAll();
                updateQuickMileage();
                showToast('✅ 已修改');
            }

            closeModal();
        }

        function save() {
            localStorage.setItem('evChargeRecords', JSON.stringify(records));
        }

        // ========== 计算每公里费用 ==========

        // 计算某条记录的每公里费用：
        // 该记录的金额 ÷（该记录里程 - 前一条有里程记录的里程）
        function getCostPerKm(recordId) {
            const sorted = [...records]
                .filter(r => r.date)
                .sort((a, b) => new Date(a.date) - new Date(b.date));

            const index = sorted.findIndex(r => r.id === recordId);
            if (index === -1) return null;

            const current = sorted[index];
            if (!current.mileage || current.mileage <= 0) return null;

            // 往前找最近一条有里程的记录
            let prevMileage = null;
            for (let i = index - 1; i >= 0; i--) {
                if (sorted[i].mileage && sorted[i].mileage > 0) {
                    prevMileage = sorted[i].mileage;
                    break;
                }
            }

            if (prevMileage === null) return null;

            const distance = current.mileage - prevMileage;
            if (distance <= 0) return null;

            return current.amount / distance;
        }

        // 整体每公里费用：总花费 ÷（最新里程 - 最早里程）
        function getOverallCostPerKm() {
            const withMileage = records.filter(r => r.mileage && r.mileage > 0);
            if (withMileage.length < 2) return null;

            const sorted = [...withMileage].sort((a, b) => new Date(a.date) - new Date(b.date));
            const earliest = sorted[0].mileage;
            const latest = sorted[sorted.length - 1].mileage;
            const totalDistance = latest - earliest;

            if (totalDistance <= 0) return null;

            const totalAmount = records.reduce((sum, r) => sum + r.amount, 0);
            return totalAmount / totalDistance;
        }

        // 格式化每公里费用显示
        function formatCostKm(cost) {
            if (cost === null || cost === undefined) return '—';
            if (cost >= 1) return '¥' + cost.toFixed(2);
            if (cost >= 0.1) return '¥' + cost.toFixed(3);
            return '¥' + cost.toFixed(4);
        }

        // ========== 渲染 ==========

        function renderAll() {
            renderStats();
            renderRecords();
        }

        function renderStats() {
            const now = new Date();
            const currentMonth = now.getMonth();
            const currentYear = now.getFullYear();

            const monthRecords = records.filter(r => {
                const d = new Date(r.date);
                return d.getMonth() === currentMonth && d.getFullYear() === currentYear;
            });
            const monthTotal = monthRecords.reduce((s, r) => s + r.amount, 0);

            const totalCount = records.length;
            const totalAmount = records.reduce((s, r) => s + r.amount, 0);
            const avgAmount = totalCount > 0 ? totalAmount / totalCount : 0;
            const overallCostKm = getOverallCostPerKm();

            document.getElementById('monthTitle').textContent = `${currentMonth + 1}月充电花费`;
            document.getElementById('monthAmount').textContent = `¥${monthTotal.toFixed(2)}`;
            document.getElementById('monthCount').textContent = `${monthRecords.length} 次充电`;
            document.getElementById('totalCount').textContent = totalCount;
            document.getElementById('totalAmount').textContent = `¥${totalAmount.toFixed(0)}`;
            document.getElementById('avgAmount').textContent = `¥${avgAmount.toFixed(1)}`;
            document.getElementById('overallCostKm').textContent = formatCostKm(overallCostKm);
        }

        function renderRecords() {
            const container = document.getElementById('recordsList');
            document.getElementById('recordsCount').textContent = `${records.length} 条`;

            if (records.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">🔋</div>
                        <p>还没有充电记录<br>添加第一条吧</p>
                    </div>
                `;
                return;
            }

            const sorted = [...records].sort((a, b) => new Date(b.date) - new Date(a.date));
            const groups = {};

            sorted.forEach(r => {
                const d = new Date(r.date);
                const key = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
                const label = `${d.getFullYear()}年${d.getMonth() + 1}月`;
                if (!groups[key]) groups[key] = { label, items: [] };
                groups[key].items.push(r);
            });

            let html = '';
            let isFirst = true;
            for (const [key, group] of Object.entries(groups)) {
                const monthTotal = group.items.reduce((s, r) => s + r.amount, 0);
                const monthCount = group.items.length;
                const openClass = isFirst ? 'open' : '';

                html += `
                    <div class="month-card ${openClass}" onclick="toggleMonth(this)">
                        <div class="month-header">
                            <div class="month-icon">${key.split('-')[1]}</div>
                            <div class="month-info">
                                <div class="month-name">${group.label}</div>
                                <div class="month-stats">${monthCount} 次充电</div>
                            </div>
                            <div class="month-total">¥${monthTotal.toFixed(2)}</div>
                            <div class="month-arrow">▼</div>
                        </div>
                        <div class="month-detail">
                            <div class="month-detail-inner">
                                ${group.items.map(r => renderRecordItem(r)).join('')}
                            </div>
                        </div>
                    </div>
                `;
                isFirst = false;
            }

            container.innerHTML = html;
        }

        function toggleMonth(card) {
            card.classList.toggle('open');
        }

        function renderRecordItem(r) {
            const d = new Date(r.date);
            const weekDays = ['日', '一', '二', '三', '四', '五', '六'];
            const dateStr = `${d.getMonth() + 1}月${d.getDate()}日 周${weekDays[d.getDay()]}`;

            const costKm = getCostPerKm(r.id);
            const costKmHtml = costKm !== null
                ? `<div class="record-cost-km">${formatCostKm(costKm)}/km</div>`
                : '';

            const mileageHtml = r.mileage
                ? `<span class="mileage-tag">${r.mileage.toLocaleString()} km</span>`
                : '';

            return `
                <div class="record-card" onclick="event.stopPropagation();openEdit(${r.id})">
                    <div class="record-icon">⚡</div>
                    <div class="record-content">
                        <div class="record-date">${dateStr}</div>
                        <div class="record-meta">
                            ${mileageHtml}
                            ${r.note ? `<span>${r.note}</span>` : ''}
                        </div>
                    </div>
                    <div class="record-right">
                        <div class="record-amount">¥${r.amount.toFixed(2)}</div>
                        ${costKmHtml}
                    </div>
                    <div class="record-actions">
                        <button class="action-btn" onclick="event.stopPropagation();openEdit(${r.id})" title="编辑">✏️</button>
                        <button class="action-btn delete" onclick="event.stopPropagation();deleteRecord(${r.id})" title="删除">×</button>
                    </div>
                </div>
            `;
        }

        function exportData() {
            if (records.length === 0) { showToast('没有数据'); return; }
            const blob = new Blob([JSON.stringify(records, null, 2)], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `充电记录_${new Date().toISOString().slice(0,10)}.json`;
            a.click();
            URL.revokeObjectURL(url);
            showToast('📥 备份成功');
        }

        function handleImport(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(ev) {
                try {
                    const data = JSON.parse(ev.target.result);
                    if (Array.isArray(data)) {
                        records = data;
                        save();
                        renderAll();
                        updateQuickMileage();
                        showToast('📤 恢复成功');
                    }
                } catch { showToast('文件格式错误'); }
            };
            reader.readAsText(file);
            e.target.value = '';
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }
    </script>
</body>
</html>
