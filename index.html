<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>充电记录</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f2f2f7;
            --card: #ffffff;
            --primary: #007aff;
            --primary-light: rgba(0,122,255,0.08);
            --text: #1c1c1e;
            --text2: #8e8e93;
            --text3: #c7c7cc;
            --border: #e5e5ea;
            --radius: 14px;
        }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body {
            font-family:'Noto Sans SC',-apple-system,BlinkMacSystemFont,sans-serif;
            background:var(--bg); color:var(--text);
            min-height:100vh; padding-bottom:72px;
            -webkit-font-smoothing:antialiased;
        }

        .top-bar {
            background:var(--card); padding:14px 20px;
            position:sticky; top:0; z-index:100;
            border-bottom:0.5px solid var(--border);
            display:flex; align-items:center; justify-content:center;
        }
        .top-bar h1 { font-size:17px; font-weight:600; }

        .stats {
            display:flex; gap:1px; margin:12px 16px 0;
            background:var(--card); border-radius:var(--radius);
            overflow:hidden;
        }
        .stats .item {
            flex:1; padding:16px 12px; text-align:center;
        }
        .stats .item + .item { border-left:0.5px solid var(--border); }
        .stats .val { font-size:22px; font-weight:700; color:var(--primary); }
        .stats .lab { font-size:11px; color:var(--text2); margin-top:4px; }

        .month-chip {
            margin:12px 16px 0; padding:12px 16px;
            background:var(--card); border-radius:var(--radius);
            display:flex; align-items:center; justify-content:space-between;
        }
        .month-chip .left { font-size:14px; color:var(--text2); }
        .month-chip .left span { font-weight:600; color:var(--text); }
        .month-chip .right { font-size:13px; color:var(--text2); }

        .section { padding:12px 16px 0; }
        .section-head {
            font-size:13px; font-weight:600; color:var(--text2);
            margin-bottom:10px; padding:0 4px;
            text-transform:uppercase; letter-spacing:0.5px;
        }

        .add-card {
            background:var(--card); border-radius:var(--radius); padding:16px;
        }
        .add-row { display:flex; gap:10px; margin-bottom:12px; }
        .add-row:last-child { margin-bottom:0; }
        .add-field { flex:1; }
        .add-field label {
            display:block; font-size:11px; color:var(--text2);
            margin-bottom:6px; font-weight:500;
        }
        .add-field input {
            width:100%; padding:10px 12px; border:1px solid var(--border);
            border-radius:10px; font-size:15px; font-family:inherit;
            background:var(--bg); outline:none; transition:border 0.2s;
        }
        .add-field input:focus { border-color:var(--primary); background:#fff; }
        .add-field input::placeholder { color:var(--text3); }
        .add-hint { font-size:11px; color:var(--text3); margin-top:4px; }
        .add-preview { font-size:11px; color:var(--primary); margin-top:4px; font-weight:500; min-height:16px; }

        .save-btn {
            width:100%; padding:12px; border-radius:10px; border:none;
            background:var(--primary); color:#fff; font-size:15px;
            font-weight:600; font-family:inherit; cursor:pointer;
            transition:opacity 0.2s; margin-top:12px;
        }
        .save-btn:active { opacity:0.7; }

        .month-group {
            background:var(--card); border-radius:var(--radius);
            margin-bottom:8px; overflow:hidden;
        }
        .mg-head {
            padding:14px 16px; display:flex; align-items:center;
            cursor:pointer; transition:background 0.15s;
        }
        .mg-head:active { background:var(--bg); }
        .mg-num {
            width:36px; height:36px; border-radius:10px;
            background:linear-gradient(135deg,#667eea,#764ba2);
            color:#fff; font-size:15px; font-weight:700;
            display:flex; align-items:center; justify-content:center;
            margin-right:12px; flex-shrink:0;
        }
        .mg-info { flex:1; }
        .mg-title { font-size:15px; font-weight:600; }
        .mg-sub { font-size:12px; color:var(--text2); margin-top:1px; }
        .mg-total { font-size:17px; font-weight:700; color:var(--primary); margin-right:10px; }
        .mg-arrow { font-size:12px; color:var(--text3); transition:transform 0.3s; }
        .month-group.open .mg-arrow { transform:rotate(180deg); }
        .mg-body { max-height:0; overflow:hidden; transition:max-height 0.3s ease; }
        .month-group.open .mg-body { max-height:2000px; }
        .mg-list { padding:0 16px 12px; border-top:0.5px solid var(--border); }

        .rec {
            display:flex; align-items:center; padding:12px 0;
            border-bottom:0.5px solid var(--bg); cursor:pointer;
        }
        .rec:last-child { border-bottom:none; }
        .rec:active { opacity:0.6; }
        .rec-dot {
            width:8px; height:8px; border-radius:50%;
            background:var(--primary); margin-right:12px; flex-shrink:0; opacity:0.5;
        }
        .rec-info { flex:1; min-width:0; }
        .rec-date { font-size:14px; font-weight:500; }
        .rec-detail { font-size:11px; color:var(--text2); margin-top:2px; }
        .rec-detail span { margin-right:6px; }
        .rec-cpk { color:var(--primary); font-weight:500; }
        .rec-price { font-size:16px; font-weight:700; color:var(--primary); margin-right:6px; }
        .rec-acts { display:flex; gap:2px; }
        .rec-btn {
            width:28px; height:28px; border-radius:6px; border:none;
            background:transparent; font-size:14px; color:var(--text3);
            cursor:pointer; display:flex; align-items:center; justify-content:center;
        }
        .rec-btn:active { background:var(--primary-light); color:var(--primary); }

        .empty { text-align:center; padding:40px 20px; color:var(--text3); font-size:14px; }

        .bottom {
            position:fixed; bottom:0; left:0; right:0;
            background:rgba(255,255,255,0.92);
            backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
            border-top:0.5px solid var(--border);
            padding:10px 16px; padding-bottom:max(10px,env(safe-area-inset-bottom));
            display:flex; gap:8px; z-index:100;
        }
        .bottom button {
            flex:1; padding:11px; border-radius:10px; border:none;
            background:var(--bg); font-size:13px; font-weight:500;
            font-family:inherit; cursor:pointer; color:var(--text);
        }
        .bottom button:active { background:var(--border); }

        .toast {
            position:fixed; top:64px; left:50%;
            transform:translateX(-50%) translateY(-16px);
            background:rgba(0,0,0,0.8); color:#fff;
            padding:10px 20px; border-radius:10px;
            font-size:13px; opacity:0; transition:all 0.3s;
            z-index:1000; pointer-events:none;
        }
        .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

        .modal-bg {
            position:fixed; inset:0; background:rgba(0,0,0,0.35);
            z-index:200; display:none; align-items:flex-end; justify-content:center;
        }
        .modal-bg.show { display:flex; }
        .modal-box {
            background:var(--card); border-radius:18px 18px 0 0;
            width:100%; max-width:500px; padding:20px;
            padding-bottom:max(20px,env(safe-area-inset-bottom));
            animation:up 0.3s ease;
        }
        @keyframes up { from{transform:translateY(100%)} to{transform:translateY(0)} }
        .modal-bar { width:32px; height:4px; background:var(--border); border-radius:2px; margin:0 auto 16px; }
        .modal-t { font-size:16px; font-weight:600; text-align:center; margin-bottom:16px; }
        .modal-btns { display:flex; gap:8px; margin-top:12px; }
        .modal-btns button {
            flex:1; padding:12px; border-radius:10px; border:none;
            font-size:15px; font-weight:600; font-family:inherit; cursor:pointer;
        }
        .modal-btns .cancel { background:var(--bg); color:var(--text); }
        .modal-btns .save { background:var(--primary); color:#fff; }
        .modal-btns button:active { opacity:0.7; }
    </style>
</head>
<body>

<div class="top-bar"><h1>充电记录</h1></div>

<div class="stats">
    <div class="item"><div class="val" id="totalKm">0</div><div class="lab">总里程</div></div>
    <div class="item"><div class="val" id="totalCost">¥0</div><div class="lab">总花费</div></div>
    <div class="item"><div class="val" id="avgCost">¥0</div><div class="lab">每公里</div></div>
</div>

<div class="month-chip">
    <div class="left">本月 <span id="mAmount">¥0</span></div>
    <div class="right" id="mInfo">0次</div>
</div>

<div class="section">
    <div class="section-head">添加记录</div>
    <div class="add-card">
        <div class="add-row">
            <div class="add-field"><label>日期</label><input type="date" id="dDate"></div>
            <div class="add-field"><label>金额（元）</label><input type="number" id="dAmount" placeholder="0.00" inputmode="decimal" oninput="preview()"></div>
        </div>
        <div class="add-row">
            <div class="add-field">
                <label>当前里程（km）</label>
                <input type="number" id="dKm" placeholder="5911" inputmode="decimal" oninput="preview()">
                <div class="add-hint" id="dHint"></div>
                <div class="add-preview" id="dPreview"></div>
            </div>
        </div>
        <button class="save-btn" onclick="add()">保存</button>
    </div>
</div>

<div class="section">
    <div class="section-head">历史记录</div>
    <div id="list"></div>
</div>

<div class="bottom">
    <button onclick="backup()">备份</button>
    <button onclick="document.getElementById('imp').click()">恢复</button>
    <input type="file" id="imp" accept=".json" style="display:none" onchange="restore(event)">
</div>

<div class="toast" id="toast"></div>

<div class="modal-bg" id="modal" onclick="if(event.target===this)closeM()">
    <div class="modal-box">
        <div class="modal-bar"></div>
        <div class="modal-t">修改记录</div>
        <div class="add-field" style="margin-bottom:12px"><label>日期</label><input type="date" id="eDate"></div>
        <div class="add-field" style="margin-bottom:12px"><label>金额（元）</label><input type="number" id="eAmount" placeholder="0.00" inputmode="decimal" oninput="ePreview()"></div>
        <div class="add-field">
            <label>当前里程（km）</label>
            <input type="number" id="eKm" placeholder="5911" inputmode="decimal" oninput="ePreview()">
            <div class="add-hint" id="eHint"></div>
            <div class="add-preview" id="ePreview"></div>
        </div>
        <div class="modal-btns">
            <button class="cancel" onclick="closeM()">取消</button>
            <button class="save" onclick="saveE()">保存</button>
        </div>
    </div>
</div>

<script>
var R=JSON.parse(localStorage.getItem('evChargeRecords'))||[];
var eid=null;

document.addEventListener('DOMContentLoaded',function(){
    document.getElementById('dDate').valueAsDate=new Date();
    all();hint();
});

function latest(){
    if(!R.length)return null;
    return R.slice().sort(function(a,b){return new Date(b.date)-new Date(a.date)})[0];
}

function latestKm(){
    var s=R.slice().sort(function(a,b){return new Date(b.date)-new Date(a.date)});
    for(var i=0;i<s.length;i++)if(s[i].currentKm)return s[i].currentKm;
    return null;
}

function hint(){
    var l=latest();
    document.getElementById('dHint').textContent=l&&l.currentKm?'上次：'+l.currentKm+'km':'首次记录';
}

function driven(km,before){
    if(!before||!before.currentKm)return 0;
    var d=km-before.currentKm;
    return d>0?d:0;
}

function preview(){
    var a=parseFloat(document.getElementById('dAmount').value);
    var k=parseFloat(document.getElementById('dKm').value);
    var el=document.getElementById('dPreview');
    if(!isNaN(a)&&a>0&&!isNaN(k)&&k>0){
        var d=driven(k,latest());
        if(d>0)el.textContent='行驶'+d+'km · ¥'+(a/d).toFixed(2)+'/km';
        else if(latest()&&latest().currentKm)el.textContent='里程需大于上次';
        else el.textContent='首次，无法计算';
    }else el.textContent='';
}

function ePreview(){
    var a=parseFloat(document.getElementById('eAmount').value);
    var k=parseFloat(document.getElementById('eKm').value);
    var el=document.getElementById('ePreview');
    if(!isNaN(a)&&a>0&&!isNaN(k)&&k>0){
        var b=before(eid);
        var d=driven(k,b);
        if(d>0)el.textContent='行驶'+d+'km · ¥'+(a/d).toFixed(2)+'/km';
        else if(b&&b.currentKm)el.textContent='里程需大于上一条';
        else el.textContent='首条，无法计算';
    }else el.textContent='';
}

function add(){
    var date=document.getElementById('dDate').value;
    var amt=parseFloat(document.getElementById('dAmount').value);
    var km=parseFloat(document.getElementById('dKm').value);
    if(!date){toast('请选择日期');return;}
    if(isNaN(amt)||amt<=0){toast('请输入金额');return;}
    var l=latest();
    var dk=0;
    if(!isNaN(km)&&km>0)dk=driven(km,l);
    R.unshift({id:Date.now(),date:date,amount:amt,currentKm:(!isNaN(km)&&km>0)?km:null,drivenKm:dk>0?dk:null,note:'',time:new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'})});
    sv();all();
    document.getElementById('dAmount').value='';
    document.getElementById('dKm').value='';
    document.getElementById('dDate').valueAsDate=new Date();
    document.getElementById('dPreview').textContent='';
    hint();toast('已保存');
    if(navigator.vibrate)navigator.vibrate([10,50,10]);
}

function del(id){
    if(!confirm('确定删除？'))return;
    R=R.filter(function(r){return r.id!==id});
    recalc();sv();all();hint();toast('已删除');
}

function before(id){
    var s=R.slice().sort(function(a,b){return new Date(b.date)-new Date(a.date)});
    var idx=-1;
    for(var i=0;i<s.length;i++){if(s[i].id===id){idx=i;break;}}
    if(idx<s.length-1)return s[idx+1];
    return null;
}

function openE(id){
    var r=R.find(function(x){return x.id===id});
    if(!r)return;
    eid=id;
    document.getElementById('eDate').value=r.date;
    document.getElementById('eAmount').value=r.amount;
    document.getElementById('eKm').value=r.currentKm||'';
    var b=before(id);
    document.getElementById('eHint').textContent=b&&b.currentKm?'上一条：'+b.currentKm+'km':'最早记录';
    ePreview();
    document.getElementById('modal').classList.add('show');
}

function closeM(){document.getElementById('modal').classList.remove('show');eid=null;}

function saveE(){
    if(!eid)return;
    var date=document.getElementById('eDate').value;
    var amt=parseFloat(document.getElementById('eAmount').value);
    var km=parseFloat(document.getElementById('eKm').value);
    if(!date){toast('请选择日期');return;}
    if(isNaN(amt)||amt<=0){toast('请输入金额');return;}
    for(var i=0;i<R.length;i++){
        if(R[i].id===eid){
            R[i].date=date;R[i].amount=amt;
            R[i].currentKm=(!isNaN(km)&&km>0)?km:null;
            break;
        }
    }
    recalc();sv();all();hint();toast('已修改');closeM();
}

function recalc(){
    var s=R.slice().sort(function(a,b){return new Date(b.date)-new Date(a.date)});
    for(var i=0;i<s.length;i++){
        var r=s[i];
        if(!r.currentKm){r.drivenKm=null;continue;}
        if(i<s.length-1){
            var p=s[i+1];
            if(p.currentKm){var d=r.currentKm-p.currentKm;r.drivenKm=d>0?d:null;}
            else r.drivenKm=null;
        }else r.drivenKm=null;
    }
}

function sv(){localStorage.setItem('evChargeRecords',JSON.stringify(R));}
function all(){stats();render();}

function stats(){
    var now=new Date(),cm=now.getMonth(),cy=now.getFullYear();
    var mr=R.filter(function(r){var d=new Date(r.date);return d.getMonth()===cm&&d.getFullYear()===cy;});
    var mt=mr.reduce(function(s,r){return s+r.amount;},0);
    var ta=R.reduce(function(s,r){return s+r.amount;},0);
    var lk=latestKm();

    document.getElementById('mAmount').textContent='¥'+mt.toFixed(2);
    document.getElementById('mInfo').textContent=mr.length+'次';

    if(lk&&lk>0)document.getElementById('totalKm').textContent=lk+'km';
    else document.getElementById('totalKm').textContent='0';

    document.getElementById('totalCost').textContent='¥'+ta.toFixed(0);
    var ae=document.getElementById('avgCost');
    if(lk&&lk>0)ae.textContent='¥'+(ta/lk).toFixed(2);
    else ae.textContent='¥0';
}

function render(){
    var c=document.getElementById('list');
    if(!R.length){c.innerHTML='<div class="empty">还没有记录</div>';return;}
    var s=R.slice().sort(function(a,b){return new Date(b.date)-new Date(a.date)});
    var g={};
    s.forEach(function(r){
        var d=new Date(r.date);
        var k=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
        var l=d.getFullYear()+'年'+(d.getMonth()+1)+'月';
        if(!g[k])g[k]={l:l,i:[]};
        g[k].i.push(r);
    });
    var h='',first=true,keys=Object.keys(g);
    for(var x=0;x<keys.length;x++){
        var k=keys[x],gr=g[k];
        var mt=gr.i.reduce(function(a,b){return a+b.amount;},0);
        var ms=gr.i.slice().sort(function(a,b){return new Date(a.date)-new Date(b.date)});
        var fk=null,lk=null;
        for(var j=0;j<ms.length;j++){
            if(ms[j].currentKm){if(fk===null)fk=ms[j].currentKm;lk=ms[j].currentKm;}
        }
        var cpk='';
        if(fk!==null&&lk!==null&&lk>fk)cpk='¥'+(mt/(lk-fk)).toFixed(2)+'/km';
        h+='<div class="month-group '+(first?'open':'')+'" onclick="tog(this)">';
        h+='<div class="mg-head">';
        h+='<div class="mg-num">'+k.split('-')[1]+'</div>';
        h+='<div class="mg-info"><div class="mg-title">'+gr.l+'</div>';
        h+='<div class="mg-sub">'+gr.i.length+'次'+(cpk?' · '+cpk:'')+'</div></div>';
        h+='<div class="mg-total">¥'+mt.toFixed(2)+'</div>';
        h+='<div class="mg-arrow">▼</div></div>';
        h+='<div class="mg-body"><div class="mg-list">';
        for(var j=0;j<gr.i.length;j++)h+=ri(gr.i[j]);
        h+='</div></div></div>';
        first=false;
    }
    c.innerHTML=h;
}

function tog(el){el.classList.toggle('open');}

function ri(r){
    var d=new Date(r.date);
    var w=['日','一','二','三','四','五','六'];
    var ds=(d.getMonth()+1)+'.'+d.getDate()+' 周'+w[d.getDay()];
    var cpk='',dk='',km='';
    if(r.drivenKm&&r.drivenKm>0){dk=r.drivenKm+'km';cpk='¥'+(r.amount/r.drivenKm).toFixed(2)+'/km';}
    if(r.currentKm)km=r.currentKm+'km';
    var h='<div class="rec" onclick="event.stopPropagation();openE('+r.id+')">';
    h+='<div class="rec-dot"></div>';
    h+='<div class="rec-info"><div class="rec-date">'+ds+'</div><div class="rec-detail">';
    if(km)h+='<span>'+km+'</span>';
    if(dk)h+='<span>'+dk+'</span>';
    if(cpk)h+='<span class="rec-cpk">'+cpk+'</span>';
    h+='</div></div>';
    h+='<div class="rec-price">¥'+r.amount.toFixed(2)+'</div>';
    h+='<div class="rec-acts">';
    h+='<button class="rec-btn" onclick="event.stopPropagation();openE('+r.id+')">✏️</button>';
    h+='<button class="rec-btn" onclick="event.stopPropagation();del('+r.id+')">✕</button>';
    h+='</div></div>';
    return h;
}

function backup(){
    if(!R.length){toast('没有数据');return;}
    var b=new Blob([JSON.stringify(R,null,2)],{type:'application/json'});
    var u=URL.createObjectURL(b);
    var a=document.createElement('a');a.href=u;
    a.download='充电记录_'+new Date().toISOString().slice(0,10)+'.json';
    a.click();URL.revokeObjectURL(u);toast('备份成功');
}

function restore(e){
    var f=e.target.files[0];if(!f)return;
    var rd=new FileReader();
    rd.onload=function(ev){
        try{
            var d=JSON.parse(ev.target.result);
            if(Array.isArray(d)){
                R=d.map(function(r){return{id:r.id||Date.now(),date:r.date,amount:r.amount,currentKm:r.currentKm||r.km||null,drivenKm:r.drivenKm||null,note:r.note||'',time:r.time||''};});
                recalc();sv();all();hint();toast('恢复成功');
            }else toast('格式错误');
        }catch(x){toast('格式错误');}
    };
    rd.readAsText(f);e.target.value='';
}

function toast(m){
    var t=document.getElementById('toast');
    t.textContent=m;t.classList.add('show');
    setTimeout(function(){t.classList.remove('show');},2000);
}
</script>
</body>
</html>
